<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CAH Draw Studio</title>
  <link rel="stylesheet" href="styles.css?v=0.6.1" />
</head>
<body>
  <main class="cah-draw-app">
    <section class="cah-draw-shell">
      <section class="cah-canvas-area">
        <div id="canvasViewport" class="cah-canvas-viewport">
          <div id="canvasStage" class="cah-canvas-stage">
            <div id="layersContainer" class="cah-layer-stack"></div>
          </div>
        </div>
      </section>

      <header class="cah-app-bar cah-panel" data-panel="header">
        <div class="cah-project-block">
          <button id="toggleUiBtn" class="cah-icon-button" type="button">☰</button>
          <div>
            <h1>CAH Draw Studio <span id="buildNumber" class="cah-build-number">Build 0.6.1</span></h1>
            <span>Autosaved locally</span>
          </div>
        </div>

        <div class="cah-header-actions">
          <button id="undoBtn" type="button">Undo</button>
          <button id="redoBtn" type="button">Redo</button>
          <button id="savePngBtn" type="button">Save PNG</button>
          <button id="openSubmitModalBtn" class="cah-submit-top-btn" type="button">Submit</button>
          <button id="clearCanvasBtn" type="button">Clear</button>
          <button id="resetPanelsBtn" type="button">Reset UI</button>
        </div>
      </header>

      <nav class="cah-tool-rail cah-panel" aria-label="Tools">
        <button id="drawToolBtn" class="cah-tool-button active" data-tool-mode="draw" type="button">
          <span>🖌</span>
          <b>Brush</b>
        </button>
        <button id="eraserToolBtn" class="cah-tool-button" data-tool-mode="erase" type="button">
          <span>▱</span>
          <b>Eraser</b>
        </button>
        <button class="cah-tool-button" data-tool-mode="fill" data-tool-action="fill" type="button">
          <span>◈</span>
          <b>Fill</b>
        </button>
        <button class="cah-tool-button" data-tool-mode="shape" type="button">
          <span>◆</span>
          <b>Shape</b>
        </button>
        <button class="cah-tool-button" data-tool-mode="selection" type="button">
          <span>◌</span>
          <b>Select</b>
        </button>
        <button class="cah-tool-button" data-tool-mode="transform" type="button">
          <span>↔</span>
          <b>Move</b>
        </button>
        <button class="cah-tool-button" data-tool-mode="text" type="button">
          <span>T</span>
          <b>Text</b>
        </button>
        <button class="cah-tool-button" data-tool-mode="eyedropper" type="button">
          <span>⌖</span>
          <b>Picker</b>
        </button>
        <button class="cah-tool-button" data-tool-mode="zoomIn" data-tool-action="zoomIn" type="button">
          <span>⌕</span>
          <b>Zoom+</b>
        </button>
        <button class="cah-tool-button" data-tool-mode="zoomOut" data-tool-action="zoomOut" type="button">
          <span>⊖</span>
          <b>Zoom-</b>
        </button>
        <button class="cah-tool-button" data-tool-mode="hand" type="button">
          <span>✋</span>
          <b>Hand</b>
        </button>
        <button id="railColorButton" class="cah-rail-color" type="button" aria-label="Current color"></button>
      </nav>

      <section class="cah-brush-library cah-panel" data-panel="brushes">
        <button class="cah-panel-min" data-min-panel="brushes" type="button">-</button>
        <div class="cah-panel-title">Brush Library</div>
        <div class="cah-brush-library-grid">
          <div class="cah-brush-categories">
            <button class="active" data-brush-filter="all" type="button">All Brushes</button>
            <button data-brush-filter="favorites" type="button">★ Favorites</button>
            <button data-brush-filter="recent" type="button">↺ Recent</button>
            <button data-brush-filter="drawing" type="button">▴ Drawing</button>
            <button data-brush-filter="painting" type="button">▥ Painting</button>
            <button data-brush-filter="wash" type="button">≈ Washes</button>
            <button data-brush-filter="texture" type="button">✦ Texture</button>
          </div>
          <div class="cah-brush-list">
            <button class="cah-brush-card active" data-brush="flat" data-category="painting" data-favorite="true" type="button">
              <span>Flat Brush</span><i class="stroke stroke-flat"></i><em>☆</em>
            </button>
            <button class="cah-brush-card" data-brush="bright" data-category="painting" type="button">
              <span>Bright Brush</span><i class="stroke stroke-bright"></i><em>☆</em>
            </button>
            <button class="cah-brush-card" data-brush="filbert" data-category="painting" data-favorite="true" type="button">
              <span>Filbert Brush</span><i class="stroke stroke-filbert"></i><em>☆</em>
            </button>
            <button class="cah-brush-card" data-brush="round" data-category="drawing" data-favorite="true" type="button">
              <span>Round Brush</span><i class="stroke stroke-round"></i><em>☆</em>
            </button>
            <button class="cah-brush-card" data-brush="fan" data-category="texture" type="button">
              <span>Fan Brush</span><i class="stroke stroke-fan"></i><em>☆</em>
            </button>
            <button class="cah-brush-card" data-brush="glaze" data-category="wash" type="button">
              <span>Glaze Brush</span><i class="stroke stroke-glaze"></i><em>☆</em>
            </button>
            <button class="cah-brush-card" data-brush="shader" data-category="painting" type="button">
              <span>Shader Brush</span><i class="stroke stroke-shader"></i><em>☆</em>
            </button>
            <button class="cah-brush-card" data-brush="catTongue" data-category="painting" type="button">
              <span>Cat Tongue</span><i class="stroke stroke-cat"></i><em>☆</em>
            </button>
            <button class="cah-brush-card" data-brush="liner" data-category="drawing" type="button">
              <span>Liner Brush</span><i class="stroke stroke-liner"></i><em>☆</em>
            </button>
            <button class="cah-brush-card" data-brush="script" data-category="drawing" type="button">
              <span>Script Brush</span><i class="stroke stroke-script"></i><em>☆</em>
            </button>
            <button class="cah-brush-card" data-brush="detailLiner" data-category="drawing" type="button">
              <span>Detail Liner</span><i class="stroke stroke-detail"></i><em>☆</em>
            </button>
            <button class="cah-brush-card" data-brush="egbert" data-category="painting" type="button">
              <span>Egbert Brush</span><i class="stroke stroke-egbert"></i><em>☆</em>
            </button>
            <button class="cah-brush-card" data-brush="mop" data-category="wash" type="button">
              <span>Mop Brush</span><i class="stroke stroke-mop"></i><em>☆</em>
            </button>
            <button class="cah-brush-card" data-brush="smudge" data-category="texture" type="button">
              <span>Smudge Mix</span><i class="stroke stroke-smudge"></i><em>☆</em>
            </button>
          </div>
        </div>
        <select id="brushSelect" class="cah-hidden-select" aria-hidden="true">
          <option value="flat">Flat Brush</option>
          <option value="bright">Bright Brush</option>
          <option value="filbert">Filbert Brush</option>
          <option value="round">Round Brush</option>
          <option value="fan">Fan Brush</option>
          <option value="glaze">Glaze Brush</option>
          <option value="shader">Shader Brush</option>
          <option value="catTongue">Cat Tongue Brush</option>
          <option value="liner">Liner Brush</option>
          <option value="script">Script Brush</option>
          <option value="detailLiner">Detail Liner</option>
          <option value="egbert">Egbert Brush</option>
          <option value="mop">Mop Brush</option>
          <option value="smudge">Smudge</option>
        </select>
      </section>

      <section class="cah-brush-settings cah-panel" data-panel="settings">
        <button class="cah-panel-min" data-min-panel="settings" type="button">-</button>
        <div class="cah-panel-title">Brush Settings</div>
        <div class="cah-brush-preview"></div>
        <label class="cah-control"><span>Size <b id="brushSizeText">8</b></span><input id="brushSize" type="range" min="1" max="180" value="8" /></label>
        <label class="cah-control"><span>Opacity <b id="brushOpacityText">100%</b></span><input id="brushOpacity" type="range" min="5" max="100" value="100" /></label>
        <label class="cah-control"><span>Flow <b id="brushFlowText">100%</b></span><input id="brushFlow" type="range" min="5" max="100" value="100" /></label>
        <label class="cah-control"><span>Spacing <b id="brushSpacingText">12%</b></span><input id="brushSpacing" type="range" min="1" max="60" value="12" /></label>
        <label class="cah-control"><span>Softness <b id="brushSoftnessText">30%</b></span><input id="brushSoftness" type="range" min="0" max="100" value="30" /></label>
        <label id="smudgeStrengthWrap" class="cah-control cah-conditional-control"><span>Smudge <b id="smudgeStrengthText">35%</b></span><input id="smudgeStrength" type="range" min="5" max="100" value="35" /></label>
        <label id="blendStrengthWrap" class="cah-control cah-conditional-control"><span>Blend <b id="blendStrengthText">45%</b></span><input id="blendStrength" type="range" min="5" max="100" value="45" /></label>
        <button id="resetBrushSettingsBtn" type="button">Reset</button>
      </section>

      <section class="cah-text-panel cah-panel" data-panel="text">
        <button class="cah-panel-min" data-min-panel="text" type="button">-</button>
        <div class="cah-panel-title">Text</div>
        <label class="cah-control"><span>Content</span><textarea id="textContentInput" class="cah-textarea cah-tool-textarea" maxlength="240" placeholder="Type text, then tap canvas"></textarea></label>
        <div class="cah-text-control-grid">
          <label class="cah-control"><span>Font</span><select id="textFontSelect" class="cah-select"><option value="Arial, Helvetica, sans-serif">Arial</option><option value="Georgia, serif">Georgia</option><option value="'Times New Roman', Times, serif">Times</option><option value="'Courier New', monospace">Courier</option><option value="'Trebuchet MS', Arial, sans-serif">Trebuchet</option><option value="Impact, Haettenschweiler, sans-serif">Impact</option></select></label>
          <label class="cah-control"><span>Align</span><select id="textAlignSelect" class="cah-select"><option value="left">Left</option><option value="center">Center</option><option value="right">Right</option></select></label>
        </div>
        <label class="cah-control"><span>Size <b id="textSizeText">48</b></span><input id="textSize" type="range" min="8" max="240" value="48" /></label>
        <label class="cah-control"><span>Outline <b id="textOutlineText">0</b></span><input id="textOutline" type="range" min="0" max="24" value="0" /></label>
        <div class="cah-text-style-row"><button id="textBoldBtn" type="button">B</button><button id="textItalicBtn" type="button">I</button><button id="textPlaceBtn" type="button">Place Text</button></div>
      </section>

      <section class="cah-canvas-panel cah-panel" data-panel="canvas">
        <button class="cah-panel-min" data-min-panel="canvas" type="button">-</button>
        <div class="cah-panel-title">Canvas</div>
        <label class="cah-control"><span>Preset</span><select id="canvasPresetSelect" class="cah-select"><option value="1920x1080">16:9 · 1920 × 1080</option><option value="1080x1920">9:16 · 1080 × 1920</option><option value="1080x1080">1:1 · 1080 × 1080</option><option value="1080x1350">4:5 · 1080 × 1350</option><option value="1800x1200">3:2 · 1800 × 1200</option><option value="1200x1800">2:3 · 1200 × 1800</option><option value="2400x3000">8×10 · 2400 × 3000</option><option value="3300x4200">11×14 · 3300 × 4200</option><option value="3600x4800">12×16 · 3600 × 4800</option><option value="4800x6000">16×20 · 4800 × 6000</option><option value="5400x7200">18×24 · 5400 × 7200</option><option value="7200x10800">24×36 · 7200 × 10800</option><option value="3000x3000">Square · 3000 × 3000</option><option value="4000x5000">Portrait · 4000 × 5000</option></select></label>
        <button id="applyCanvasPresetBtn" type="button">Apply Canvas Size</button>
      </section>

      <section class="cah-color-panel cah-panel" data-panel="color">
        <button class="cah-panel-min" data-min-panel="color" type="button">-</button>
        <div class="cah-panel-title">Color</div>
        <div id="colorWheel" class="cah-color-wheel"><span id="colorWheelHandle" class="cah-color-wheel-handle"></span></div>
        <div id="colorSquare" class="cah-color-square"><span id="colorSquareHandle" class="cah-color-square-handle"></span></div>
        <input id="colorPicker" type="color" value="#111111" />
        <div class="cah-swatches"><button type="button" data-swatch="#111111"></button><button type="button" data-swatch="#8f241f"></button><button type="button" data-swatch="#e86b2f"></button><button type="button" data-swatch="#f2b84b"></button><button type="button" data-swatch="#6d94ee"></button><button type="button" data-swatch="#ffffff"></button></div>
      </section>

      <section class="cah-layers-panel cah-panel" data-panel="layers">
        <button class="cah-panel-min" data-min-panel="layers" type="button">-</button>
        <div class="cah-panel-title-row"><div class="cah-panel-title">Layers</div><button id="addLayerTopBtn" type="button">+ Layer</button></div>
        <div id="layersList" class="cah-layers-list"></div>
      </section>

      <section id="navGizmo" class="cah-nav-gizmo cah-panel" data-panel="gizmo">
        <button class="cah-panel-min" data-min-panel="gizmo" type="button">-</button>
        <div id="gizmoDragHandle" class="cah-gizmo-drag">Move View</div>
        <div class="cah-gizmo-grid"><button id="panUpBtn" type="button">↑</button><button id="panLeftBtn" type="button">←</button><button id="resetViewBtn" type="button">Reset</button><button id="panRightBtn" type="button">→</button><button id="panDownBtn" type="button">↓</button></div>
        <div class="cah-gizmo-row"><button id="zoomOutBtn" type="button">−</button><button id="zoomInBtn" type="button">+</button></div>
        <div class="cah-gizmo-row"><button id="rotateLeftBtn" type="button">↺</button><button id="rotateRightBtn" type="button">↻</button></div>
      </section>

      <section id="submitModal" class="cah-submit-modal" aria-hidden="true">
        <div class="cah-submit-modal-card">
          <button id="closeSubmitModalBtn" class="cah-submit-close" type="button">×</button>
          <div class="cah-kicker">Submit Drawing</div>
          <h2>Send to Charlotte Art Hub for review</h2>
          <p>Your drawing will be reviewed before it appears publicly.</p>
          <canvas id="submitPreviewCanvas" class="cah-submit-preview"></canvas>
          <div class="cah-submit-grid">
            <label class="cah-control"><span>Artist Name</span><input id="submitArtistName" class="cah-text-input" type="text" maxlength="160" placeholder="Your name" /></label>
            <label class="cah-control"><span>Contact / IG / Website</span><input id="submitContact" class="cah-text-input" type="text" maxlength="220" placeholder="@handle or email" /></label>
            <label class="cah-control"><span>Title</span><input id="submitTitle" class="cah-text-input" type="text" maxlength="160" placeholder="Untitled Drawing" /></label>
            <label class="cah-control"><span>Age Group</span><select id="submitAgeGroup" class="cah-select"><option value="Adult">Adult</option><option value="Teen">Teen</option><option value="Child">Child</option><option value="Not specified">Prefer not to say</option></select></label>
            <label id="guardianNameWrap" class="cah-control cah-guardian-wrap"><span>Parent / Guardian Name</span><input id="submitGuardianName" class="cah-text-input" type="text" maxlength="160" placeholder="Required for child submissions" /></label>
            <label class="cah-control cah-description-control"><span>Description</span><textarea id="submitDescription" class="cah-textarea" maxlength="1000" placeholder="Short description"></textarea></label>
          </div>
          <label class="cah-check-row"><input id="submitPermission" type="checkbox" /><span>I have permission to submit this drawing to Charlotte Art Hub for review.</span></label>
          <div class="cah-submit-modal-actions"><button id="cancelSubmitModalBtn" type="button">Back to Drawing</button><button id="submitDrawingBtn" class="cah-submit-action" type="button">Submit for Review</button></div>
          <div id="submitStatus" class="cah-submit-status" aria-live="polite"></div>
        </div>
      </section>
    </section>
  </main>
  <script src="app.js?v=0.6.1"></script>
  <script src="draw-ui-lock.js?v=0.6.1"></script>
</body>
</html>
